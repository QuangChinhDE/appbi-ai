# ============================================================
# AppBI — Nginx Configuration
# Version: 1.0  |  Target: Ubuntu + Let's Encrypt (certbot)
#
# SETUP STEPS:
#   1. Install dependencies:
#        sudo apt install -y nginx certbot python3-certbot-nginx
#
#   2. Copy this file:
#        sudo cp nginx.conf /etc/nginx/nginx.conf
#
#   3. Edit the two CHANGE_THIS_DOMAIN lines below to your real domain.
#
#   4. Test & reload:
#        sudo nginx -t && sudo systemctl reload nginx
#
#   5. Issue SSL certificate (certbot will edit this file automatically):
#        sudo certbot --nginx -d your-domain.com
#
#   6. Final reload:
#        sudo systemctl reload nginx
#
# PORT MAPPING (Docker containers → host):
#   Frontend  (Next.js)          : 127.0.0.1:3000
#   Backend   (FastAPI)          : 127.0.0.1:8000
#   AI Chat   (chat-service)     : 127.0.0.1:8001
#   AI Agent  (agent-service)    : 127.0.0.1:8002
#
# URL ROUTING LOGIC:
#   /          → Frontend :3000  (Next.js handles SSR + static assets + /api/auth/* proxies)
#   /api/v1/*  → Backend  :8000  (REST API, prefix /api/v1/ preserved)
#   /chat/*    → AI Chat  :8001  (HTTP + WebSocket, /chat/ prefix preserved)
#   /agent/*   → AI Agent :8002  (HTTP SSE streams, /agent/ prefix preserved)
#
# NOTE ON NEXT.JS REWRITES:
#   next.config.js also has rewrites for /api/v1/*, /chat/*, /agent/*.
#   Those rewrites act as a fallback when nginx is NOT in front (localhost dev).
#   On production nginx intercepts these paths BEFORE Next.js, which is correct.
# ============================================================

user www-data;
worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log warn;
include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 1024;
    multi_accept on;
}

http {

    # ── Basic Settings ────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    server_tokens      off;   # hide nginx version from responses

    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── SSL / TLS Settings ────────────────────────────────────────────────────
    # TLSv1.0 and TLSv1.1 are DISABLED — both are deprecated and insecure.
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       10m;
    ssl_stapling              on;
    ssl_stapling_verify       on;

    # ── Logging ───────────────────────────────────────────────────────────────
    access_log /var/log/nginx/access.log;

    # ── Gzip Compression ──────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml+rss
        application/atom+xml image/svg+xml;

    # =========================================================================
    # SERVER BLOCK 1: HTTP → HTTPS redirect (port 80)
    # =========================================================================
    server {
        listen      80;
        listen      [::]:80;
        server_name report.base-datateam.com;   # ← CHANGE_THIS_DOMAIN

        # Let certbot complete ACME challenges for certificate issuance.
        location /.well-known/acme-challenge/ {
            root /var/www/html;
        }

        # Everything else → HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # =========================================================================
    # SERVER BLOCK 2: HTTPS (port 443) — main AppBI virtual host
    #
    # SSL certificate paths below are populated automatically when you run:
    #   sudo certbot --nginx -d report.base-datateam.com
    # =========================================================================
    server {
        listen      443 ssl http2;
        listen      [::]:443 ssl http2;
        server_name report.base-datateam.com;   # ← CHANGE_THIS_DOMAIN

        # ── SSL Certificate (managed by certbot) ─────────────────────────────
        # These two lines are added/updated by certbot automatically.
        # Before running certbot, comment them out and test with HTTP first.
        ssl_certificate     /etc/letsencrypt/live/report.base-datateam.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/report.base-datateam.com/privkey.pem;
        # certbot also writes recommended options to this file:
        include /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

        # ── Upload limit ─────────────────────────────────────────────────────
        client_max_body_size 250m;

        # ── IP Whitelist ─────────────────────────────────────────────────────
        # Only listed IPs can access the application. All others get 403.
        # Add one "allow x.x.x.x;" line per permitted IP or CIDR block.
        # After editing, reload nginx:  sudo nginx -t && sudo systemctl reload nginx
        #
        # To find your current public IP:  curl -s ifconfig.me
        #
        # ── Office / VPN / Developer IPs ──
        # allow 1.2.3.4;           # Example: Office public IP
        # allow 10.0.0.0/8;        # Example: Internal VPN range
        # allow 192.168.0.0/16;    # Example: Local network
        #
        # ── Server itself (required for internal Docker communication) ──
        allow 127.0.0.1;
        allow ::1;
        #
        # ── Deny everything else ──
        deny all;

        # ── Security Headers ────────────────────────────────────────────────
        add_header X-Frame-Options            "SAMEORIGIN"                            always;
        add_header X-Content-Type-Options     "nosniff"                               always;
        add_header X-XSS-Protection           "1; mode=block"                         always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin"       always;
        add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload" always;
        add_header Content-Security-Policy    "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; connect-src 'self' wss:; img-src 'self' data: blob:; font-src 'self' data:; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;
        add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;

        # ── Location: Frontend — Next.js (port 3000) ─────────────────────────
        # Catches all requests NOT matched by the more-specific blocks below.
        # Next.js handles its own internal rewrites (/api/v1, /chat, /agent)
        # only when nginx does NOT intercept them first — so production traffic
        # for those paths is handled by the blocks further down.
        # WebSocket upgrade headers included for Next.js HMR and SSE fallback.
        # Next.js static chunks have content-addressed URLs (hashed filenames) —
        # safe to cache forever.  The HTML pages must NOT be cached so browsers
        # always fetch the latest HTML (which references the correct chunk hashes)
        # after a new deployment.
        # ── Location: Embed pages — allow third-party iframe embedding ────────
        # /embed/{token} routes are intentionally frameable by any origin.
        # IMPORTANT: nginx's add_header in a child block replaces ALL inherited
        # parent-level add_header directives, so all needed security headers
        # must be re-declared here. X-Frame-Options is intentionally OMITTED
        # and frame-ancestors in CSP is set to '*'.
        location /embed/ {
            proxy_pass         http://127.0.0.1:3000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade            $http_upgrade;
            proxy_set_header   Connection         "upgrade";
            proxy_set_header   Host               $host;
            proxy_set_header   X-Real-IP          $remote_addr;
            proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto  $scheme;
            proxy_read_timeout 300s;
            proxy_buffering    off;
            add_header         Cache-Control "no-store, no-cache, must-revalidate";
            # Security headers for embed — X-Frame-Options omitted intentionally
            add_header X-Content-Type-Options     "nosniff"                           always;
            add_header X-XSS-Protection           "1; mode=block"                     always;
            add_header Referrer-Policy            "strict-origin-when-cross-origin"   always;
            add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload" always;
            add_header Content-Security-Policy    "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; connect-src 'self' wss:; img-src 'self' data: blob:; font-src 'self' data:; frame-ancestors *; base-uri 'self'; form-action 'self'" always;
            add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;
        }

        location /_next/static/ {            proxy_pass         http://127.0.0.1:3000;
            proxy_http_version 1.1;
            proxy_set_header   Host               $host;
            proxy_set_header   X-Forwarded-Proto  $scheme;
            add_header         Cache-Control "public, max-age=31536000, immutable";
        }

        location / {
            proxy_pass         http://127.0.0.1:3000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade            $http_upgrade;
            proxy_set_header   Connection         "upgrade";
            proxy_set_header   Host               $host;
            proxy_set_header   X-Real-IP          $remote_addr;
            proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto  $scheme;
            proxy_read_timeout 300s;
            proxy_buffering    off;
            # Never cache HTML — ensures browsers always get the latest page after deployment
            add_header         Cache-Control "no-store, no-cache, must-revalidate";
        }

        # ── Location: REST API → Backend FastAPI (port 8000) ─────────────────
        # IMPORTANT: proxy ONLY /api/v1/ here.
        # Next.js also owns /api/auth/* routes on port 3000, used for same-origin
        # login/logout cookie handling. If nginx intercepts all /api/* requests,
        # /api/auth/login is incorrectly sent to the backend and returns 404.
        #
        # Trailing slash on BOTH source and proxy_pass preserves the full prefix:
        # /api/v1/foo → http://127.0.0.1:8000/api/v1/foo
        location /api/v1/ {
            proxy_pass         http://127.0.0.1:8000/api/v1/;
            proxy_http_version 1.1;
            proxy_set_header   Host               $host;
            proxy_set_header   X-Real-IP          $remote_addr;
            proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto  $scheme;
            proxy_read_timeout 120s;
        }

        # ── Block internal-only AI endpoints from external access ─────────────
        # Health endpoints expose service internals (model, provider, etc.)
        # and must not be reachable from the public internet.
        location = /agent/health { return 403; }

        # ── Location: AI Agent SSE streams (port 8002) ───────────────────────
        # proxy_pass WITHOUT trailing slash → nginx passes the full URI to the
        # upstream, so /agent/plan/stream → http://127.0.0.1:8002/agent/plan/stream
        # Agent service routes:
        #   POST /agent/plan/stream
        #   POST /agent/build/stream
        # SSE (Server-Sent Events) requires buffering OFF and long timeout.
        location /agent/ {
            proxy_pass                  http://127.0.0.1:8002;
            proxy_http_version          1.1;
            proxy_set_header            Host               $host;
            proxy_set_header            X-Real-IP          $remote_addr;
            proxy_set_header            X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header            X-Forwarded-Proto  $scheme;
            proxy_read_timeout          600s;
            # SSE — must disable buffering so chunks reach the browser immediately
            proxy_buffering             off;
            proxy_cache                 off;
            chunked_transfer_encoding   on;
        }

        # Chat cleanup is an admin-only internal maintenance endpoint.
        location = /chat/cleanup { return 403; }

        # ── Location: Chat PAGE → Next.js (port 3000) ────────────────────────
        # The frontend has a /chat page served by Next.js.  Exact-match
        # blocks below ensure page navigation (including RSC prefetch like
        # /chat/?_rsc=xxx) reaches Next.js instead of the AI chat service.
        # nginx exact-match (=) has highest priority and only checks the
        # URI path, so /chat/?_rsc=zyoa1 matches "= /chat/" correctly.
        location = /chat {
            proxy_pass         http://127.0.0.1:3000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade            $http_upgrade;
            proxy_set_header   Connection         "upgrade";
            proxy_set_header   Host               $host;
            proxy_set_header   X-Real-IP          $remote_addr;
            proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto  $scheme;
            proxy_read_timeout 300s;
            proxy_buffering    off;
        }
        location = /chat/ {
            proxy_pass         http://127.0.0.1:3000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade            $http_upgrade;
            proxy_set_header   Connection         "upgrade";
            proxy_set_header   Host               $host;
            proxy_set_header   X-Real-IP          $remote_addr;
            proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto  $scheme;
            proxy_read_timeout 300s;
            proxy_buffering    off;
        }

        # ── Location: AI Chat + WebSocket (port 8001) ────────────────────────
        # Sub-paths like /chat/ws, /chat/sessions/* go to the AI chat service.
        # The exact-match blocks above take priority for /chat and /chat/.
        # proxy_pass WITH trailing /chat/ → /chat/ prefix is preserved at the
        # chat service: /chat/ws → http://127.0.0.1:8001/chat/ws
        # WebSocket upgrade headers are required for ws:// connections.
        # Long timeout (3600s) needed for persistent chat sessions.
        location /chat/ {
            proxy_pass         http://127.0.0.1:8001/chat/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade            $http_upgrade;
            proxy_set_header   Connection         "upgrade";
            proxy_set_header   Host               $host;
            proxy_set_header   X-Real-IP          $remote_addr;
            proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto  $scheme;
            proxy_read_timeout 3600s;
            proxy_buffering    off;
        }
    }
}
