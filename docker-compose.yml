# ============================================================
# AppBI Core BI Stack
#
# Start base stack:
#   docker compose up --build -d
#
# Optional AI overlays:
#   docker compose -f docker-compose.yml -f docker-compose.ai.yml up -d --build
#   docker compose -f docker-compose.yml -f docker-compose.chat.yml up -d --build
#   docker compose -f docker-compose.yml -f docker-compose.agent.yml up -d --build
# ============================================================

services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-appbi}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-appbi}
      POSTGRES_DB: ${DB_NAME:-appbi}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-appbi} -d ${DB_NAME:-appbi}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks:
      - appbi-net

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg2://${DB_USER:-appbi}:${DB_PASSWORD:-appbi}@db:5432/${DB_NAME:-appbi}
      DB_HOST: db
      POSTGRES_USER: ${DB_USER:-appbi}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-appbi}
      POSTGRES_DB: ${DB_NAME:-appbi}
      CORS_ORIGINS: http://localhost:${FRONTEND_PORT:-3000},http://frontend:3000
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SECRET_KEY: ${SECRET_KEY:-change-this-in-production}
      API_RELOAD: "false"
      SEED_DEMO_DATA: ${SEED_DEMO_DATA:-false}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@appbi.io}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-123456}
      ADMIN_NAME: ${ADMIN_NAME:-Admin}
      DATA_DIR: /app/.data
      DATASOURCE_ENCRYPTION_KEY: ${DATASOURCE_ENCRYPTION_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
    volumes:
      - appbi_data:/app/.data
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - appbi-net
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:${BACKEND_PORT:-8000}/api/v1
        NEXT_PUBLIC_AI_CHAT_WS_URL: ws://localhost:${AI_CHAT_PORT:-8001}/chat/ws
        NEXT_PUBLIC_AI_CHAT_HTTP_URL: http://localhost:${AI_CHAT_PORT:-8001}
        NEXT_PUBLIC_AI_AGENT_HTTP_URL: http://localhost:${AI_AGENT_PORT:-8002}
    restart: unless-stopped
    environment:
      BACKEND_URL: http://backend:8000/api/v1
      SECRET_KEY: ${SECRET_KEY:-change-this-in-production}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - appbi-net

volumes:
  db_data:
  appbi_data:

networks:
  appbi-net:
    name: appbi-net
    driver: bridge
