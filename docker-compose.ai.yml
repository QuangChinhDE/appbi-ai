services:
  ai-chat-service:
    build:
      context: .
      dockerfile: ai-service/Dockerfile
    restart: unless-stopped
    environment:
      BI_API_URL: http://backend:8000/api/v1
      SECRET_KEY: ${SECRET_KEY:-change-this-in-production}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      LLM_FALLBACK_CHAIN: ${LLM_FALLBACK_CHAIN:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      AI_SESSION_TTL_MINUTES: ${AI_SESSION_TTL_MINUTES:-30}
      AI_MAX_TOOL_CALLS: ${AI_MAX_TOOL_CALLS:-8}
      AI_WORKSPACE_TABLE_LIMIT: ${AI_WORKSPACE_TABLE_LIMIT:-50}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "${AI_CHAT_PORT:-8001}:8001"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - appbi-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  ai-agent-service:
    build:
      context: .
      dockerfile: ai-agent-service/Dockerfile
    restart: unless-stopped
    environment:
      BI_API_URL: http://backend:8000/api/v1
      SECRET_KEY: ${SECRET_KEY:-change-this-in-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      LLM_FALLBACK_CHAIN: ${LLM_FALLBACK_CHAIN:-}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-60}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
    ports:
      - "${AI_AGENT_PORT:-8002}:8001"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - appbi-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
