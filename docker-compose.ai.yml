services:
  ai-chat-service:
    build:
      context: .
      dockerfile: ai-service/Dockerfile
    restart: unless-stopped
    environment:
      BI_API_URL: http://backend:8000/api/v1
      SECRET_KEY: ${SECRET_KEY:-change-this-in-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://frontend:3000}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      LLM_MODEL: ${LLM_MODEL:-openai/gpt-4o-mini}
      LLM_FALLBACK_CHAIN: ${LLM_FALLBACK_CHAIN:-}
      AI_CHAT_MODEL: ${AI_CHAT_MODEL:-}
      AI_CHAT_FALLBACK_MODELS: ${AI_CHAT_FALLBACK_MODELS:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_API_KEY_1: ${OPENROUTER_API_KEY_1:-}
      OPENROUTER_API_KEY_2: ${OPENROUTER_API_KEY_2:-}
      OPENROUTER_API_KEY_3: ${OPENROUTER_API_KEY_3:-}
      OPENROUTER_API_KEY_4: ${OPENROUTER_API_KEY_4:-}
      OPENROUTER_API_KEY_5: ${OPENROUTER_API_KEY_5:-}
      OPENROUTER_SITE_URL: ${OPENROUTER_SITE_URL:-http://localhost:${FRONTEND_PORT:-3000}}
      OPENROUTER_APP_NAME: ${OPENROUTER_APP_NAME:-AppBI AI Chat}
      AI_SESSION_TTL_MINUTES: ${AI_SESSION_TTL_MINUTES:-30}
      AI_MAX_TOOL_CALLS: ${AI_MAX_TOOL_CALLS:-8}
      AI_WORKSPACE_TABLE_LIMIT: ${AI_WORKSPACE_TABLE_LIMIT:-50}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      # Bind to 127.0.0.1 so the chat service is reachable only via nginx,
      # not directly from the public internet.
      - "127.0.0.1:${AI_CHAT_PORT:-8001}:8001"
    # AI Chat is not exposed to host in production — accessed only via
    # the internal Docker network (frontend reverse-proxy and nginx).
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - appbi-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  ai-agent-service:
    build:
      context: .
      dockerfile: ai-agent-service/Dockerfile
    restart: unless-stopped
    environment:
      BI_API_URL: http://backend:8000/api/v1
      SECRET_KEY: ${SECRET_KEY:-change-this-in-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://frontend:3000}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LLM_MODEL: ${LLM_MODEL:-openai/gpt-4o-mini}
      LLM_FALLBACK_CHAIN: ${LLM_FALLBACK_CHAIN:-}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-60}
      AI_AGENT_MODEL: ${AI_AGENT_MODEL:-}
      AI_AGENT_LLM_MODEL: ${AI_AGENT_LLM_MODEL:-}
      AI_AGENT_ENRICHMENT_MODEL: ${AI_AGENT_ENRICHMENT_MODEL:-}
      AI_AGENT_PLANNING_MODEL: ${AI_AGENT_PLANNING_MODEL:-}
      AI_AGENT_INSIGHT_MODEL: ${AI_AGENT_INSIGHT_MODEL:-}
      AI_AGENT_NARRATIVE_MODEL: ${AI_AGENT_NARRATIVE_MODEL:-}
      AI_AGENT_FALLBACK_MODELS: ${AI_AGENT_FALLBACK_MODELS:-}
      AI_AGENT_LLM_FALLBACK_CHAIN: ${AI_AGENT_LLM_FALLBACK_CHAIN:-}
      AI_AGENT_LLM_TIMEOUT_SECONDS: ${AI_AGENT_LLM_TIMEOUT_SECONDS:-0}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_API_KEY_1: ${OPENROUTER_API_KEY_1:-}
      OPENROUTER_API_KEY_2: ${OPENROUTER_API_KEY_2:-}
      OPENROUTER_API_KEY_3: ${OPENROUTER_API_KEY_3:-}
      OPENROUTER_API_KEY_4: ${OPENROUTER_API_KEY_4:-}
      OPENROUTER_API_KEY_5: ${OPENROUTER_API_KEY_5:-}
      OPENROUTER_SITE_URL: ${OPENROUTER_SITE_URL:-http://localhost:${FRONTEND_PORT:-3000}}
      OPENROUTER_APP_NAME: ${OPENROUTER_APP_NAME:-AppBI AI Agent}
    ports:
      # Bind to 127.0.0.1 so the agent service is reachable only via nginx,
      # not directly from the public internet. Maps host 8002 → container 8001.
      - "127.0.0.1:${AI_AGENT_PORT:-8002}:8001"
    # AI Agent is not exposed to host in production — accessed only via
    # the internal Docker network (frontend reverse-proxy and nginx).
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - appbi-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
