services:
  ai-agent-service:
    build:
      context: .
      dockerfile: ai-agent-service/Dockerfile
    restart: unless-stopped
    environment:
      BI_API_URL: http://backend:8000/api/v1
      SECRET_KEY: ${SECRET_KEY:-change-this-in-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LLM_MODEL: ${LLM_MODEL:-openai/gpt-4o-mini}
      LLM_FALLBACK_CHAIN: ${LLM_FALLBACK_CHAIN:-}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-60}
      AI_AGENT_MODEL: ${AI_AGENT_MODEL:-}
      AI_AGENT_LLM_MODEL: ${AI_AGENT_LLM_MODEL:-}
      AI_AGENT_PLANNING_MODEL: ${AI_AGENT_PLANNING_MODEL:-}
      AI_AGENT_INSIGHT_MODEL: ${AI_AGENT_INSIGHT_MODEL:-}
      AI_AGENT_NARRATIVE_MODEL: ${AI_AGENT_NARRATIVE_MODEL:-}
      AI_AGENT_FALLBACK_MODELS: ${AI_AGENT_FALLBACK_MODELS:-}
      AI_AGENT_LLM_FALLBACK_CHAIN: ${AI_AGENT_LLM_FALLBACK_CHAIN:-}
      AI_AGENT_LLM_TIMEOUT_SECONDS: ${AI_AGENT_LLM_TIMEOUT_SECONDS:-0}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_SITE_URL: ${OPENROUTER_SITE_URL:-http://localhost:${FRONTEND_PORT:-3000}}
      OPENROUTER_APP_NAME: ${OPENROUTER_APP_NAME:-AppBI AI Agent}
    ports:
      - "${AI_AGENT_PORT:-8002}:8001"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - appbi-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
