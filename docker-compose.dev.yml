version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: appbi-db-dev
    environment:
      POSTGRES_USER: appbi
      POSTGRES_PASSWORD: appbi
      POSTGRES_DB: appbi
    volumes:
      - db_data_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appbi"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - appbi-network

  # FastAPI Backend with hot reload
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: appbi-backend-dev
    volumes:
      # Mount source code for hot reload
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      # Parquet + DuckDB storage
      - appbi_data_dev:/app/.data
    environment:
      DATABASE_URL: postgresql+psycopg2://appbi:appbi@db:5432/appbi
      DB_HOST: db
      POSTGRES_USER: appbi
      POSTGRES_PASSWORD: appbi
      POSTGRES_DB: appbi
      API_HOST: 0.0.0.0
      API_PORT: 8000
      CORS_ORIGINS: http://localhost:3000,http://frontend:3000
      LOG_LEVEL: DEBUG
      SECRET_KEY: dev-secret-key
      SEED_DEMO_DATA: "false"
      DATA_DIR: /app/.data
      DATASOURCE_ENCRYPTION_KEY: ${DATASOURCE_ENCRYPTION_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    # Override entrypoint for hot reload
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8000
    restart: unless-stopped
    networks:
      - appbi-network

  # Next.js Frontend with hot reload
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: appbi-frontend-dev
    volumes:
      # Mount source code for hot reload
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      # Preserve node_modules
      - /app/node_modules
      - /app/.next
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - appbi-network

volumes:
  db_data_dev:
    driver: local
  appbi_data_dev:
    driver: local

networks:
  appbi-network:
    driver: bridge
