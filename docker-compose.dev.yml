# Development stack for hot reload.
#
# Base dev stack:
#   docker compose -f docker-compose.dev.yml up --build -d
#
# Dev stack + both AI services:
#   docker compose -f docker-compose.dev.yml -f docker-compose.ai.yml up --build -d
#
# Dev stack + chat only:
#   docker compose -f docker-compose.dev.yml -f docker-compose.chat.yml up --build -d
#
# Dev stack + agent only:
#   docker compose -f docker-compose.dev.yml -f docker-compose.agent.yml up --build -d

services:
  db:
    image: postgres:16-alpine
    container_name: appbi-db-dev
    environment:
      POSTGRES_USER: appbi
      POSTGRES_PASSWORD: appbi
      POSTGRES_DB: appbi
    volumes:
      - db_data_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appbi"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - appbi-net

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: appbi-backend-dev
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - appbi_data_dev:/app/.data
    environment:
      DATABASE_URL: postgresql+psycopg2://appbi:appbi@db:5432/appbi
      DB_HOST: db
      POSTGRES_USER: appbi
      POSTGRES_PASSWORD: appbi
      POSTGRES_DB: appbi
      API_HOST: 0.0.0.0
      API_PORT: 8000
      CORS_ORIGINS: http://localhost:3000,http://frontend:3000
      LOG_LEVEL: DEBUG
      SECRET_KEY: dev-secret-key
      SEED_DEMO_DATA: "false"
      DATA_DIR: /app/.data
      DATASOURCE_ENCRYPTION_KEY: ${DATASOURCE_ENCRYPTION_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_SITE_URL: ${OPENROUTER_SITE_URL:-http://localhost:3000}
      OPENROUTER_APP_NAME: ${OPENROUTER_APP_NAME:-AppBI}
      AI_DESCRIPTION_MODEL: ${AI_DESCRIPTION_MODEL:-}
      OPENROUTER_EMBEDDING_MODEL: ${OPENROUTER_EMBEDDING_MODEL:-openai/text-embedding-3-small}
      OPENROUTER_EMBEDDING_DIMENSIONS: ${OPENROUTER_EMBEDDING_DIMENSIONS:-768}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8000
    restart: unless-stopped
    networks:
      - appbi-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: appbi-frontend-dev
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - /app/node_modules
      - /app/.next
    environment:
      # Relative path — Next.js dev server rewrites /api/v1/* → backend container.
      NEXT_PUBLIC_API_URL: /api/v1
      # AI service URLs derived at runtime from window.location (no localhost baking).
      BACKEND_URL: http://backend:8000/api/v1
      AI_CHAT_INTERNAL_URL: http://ai-chat-service:8001
      AI_AGENT_INTERNAL_URL: http://ai-agent-service:8001
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - appbi-net

volumes:
  db_data_dev:
    driver: local
  appbi_data_dev:
    driver: local

networks:
  appbi-net:
    driver: bridge
